version: '3.8'

services:
  requesto:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4747:4747"
    volumes:
      - requesto-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4747
      - HOST=0.0.0.0
    restart: unless-stopped

volumes:
  requesto-data:
