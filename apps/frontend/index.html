<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requesto - API Client</title>
    <script>
      // Handle OAuth callback redirects for HashRouter compatibility
      // When OAuth providers redirect to /oauth/callback?code=..., we need to
      // redirect to /#/oauth/callback?code=... for HashRouter to handle it
      (function() {
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;

        if (path === '/oauth/callback' && !hash) {
          window.location.replace('/#/oauth/callback' + search);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
